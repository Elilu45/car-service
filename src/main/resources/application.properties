spring.application.name=car-service

# Indirizzo del DB (localhost perché il container espone la porta 5432 sul tuo PC)
# spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
# spring.datasource.username=postgres
# spring.datasource.password=poppapoppo123


# Se Spring trova una variabile d'ambiente 'DB_URL', usa quella. 
# Altrimenti usa localhost (quello che hai ora).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:poppapoppo123}

spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: crea le tabelle in automatico basandosi sulle tue classi Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cambia il percorso della documentazione (opzionale)
springdoc.swagger-ui.path=/swagger-ui.html
# Ordina gli endpoint alfabeticamente
springdoc.swagger-ui.operationsSorter=alpha

# Logging
logging.file.name=logs/car-service.log
logging.level.com.example.car_service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] [%X{car-Request-ID}] %logger{36} : %m%n